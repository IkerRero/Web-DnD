    <style>

        #NavBar {

            box-sizing:border-box;
            margin:0px; padding:0px;

            border-bottom-style: solid;
            border-bottom-color:  rgb(197, 195, 43);
            border-bottom-width:  10px;

            width: 100vw; height: 100px;
            background-color: rgb(44, 25, 25);
            position:relative;
            position: sticky;
            top: 0;
        }

        .cajaDado{   
            margin:0px; padding:0px; 
            border: red, dashed, 10px;
            width: 250px;height: 100px; 
            position:relative;
            box-sizing:border-box;
            float:left;
            align-content: center;
        }

            float:right;
            align-content: center;
        }

            box-sizing:border-box;
            float:right;
        }
        .cajaTexto{
            margin:0px; padding:0px; 
            border: rgb(0, 0, 0), dashed, 1px;
            width: 25%;height: 80px; 
            position:relative;
            box-sizing:border-box;
            float:left;
            align-content: center;

        .cajaImagen{

            width: 25%;height: 80px; 
            position:relative;

            float:left;
