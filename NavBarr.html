<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavBarr</title>

    <style>

        #NavBar {
            box-sizing:border-box;
            margin:0px; padding:0px;

            border-bottom-style: solid;
            border-bottom-color:  rgb(197, 195, 43);
            border-bottom-width:  10px;

            width: 100vw; height: 100px;
            background-color: rgb(44, 25, 25);
            position:relative;
        }

        .cajaDado{   
            margin:0px; padding:0px; 
            border: red, dashed, 10px;
            width: 250px;height: 100px; 
            position:relative;
            box-sizing:border-box;
            float:left;
        }
        .caja1{   
            margin:0px; padding:0px; 
            border: rgb(0, 255, 200), dashed, 10px;
            width: 450px;height: 100px; 
            position:relative;
            box-sizing:border-box;
            float:right;
        }
        .caja2{   
            margin:0px; padding:0px; 
            border: rgb(247, 0, 255), dashed, 10px;
            width: 750px;height: 100px; 
            position:relative;
            box-sizing:border-box;
            float:right;
        }

        
    </style>
</head>

<body>
    <div id="NavBar">
        <div class="cajaDado">
            

        </div>
        <div class="caja1">
            

        </div>
        <div class="caja2">
            

        </div>

    </div>
    
</body>
</html>
